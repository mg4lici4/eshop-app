<mat-nav-list color="secundary">
  @for (item of menuItems; track $index) {
    <a mat-list-item [routerLink]="item.route" class="menu-item">
      <mat-icon matListIcon>{{ item.icon }}</mat-icon>
      <span matLine>{{ item.label }}</span>
    </a>
  }

  <a mat-list-item (click)="cerrarSesion()" class="menu-item">
    <mat-icon matListIcon>logout</mat-icon>
    <span matLine>Cerrar sesion</span>
  </a>
</mat-nav-list>
